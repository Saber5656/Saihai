{
  "registry_version": "1",
  "format": "yaml",
  "model_registry_source": "skills/infra-team-bootstrap/references/model-registry.md",
  "queue_root": "${ITB_STATE_ROOT}/<session>/queue",
  "role_layers": {
    "business-director": "director",
    "business-information-strategy": "worker",
    "business-legal-reviewer": "worker",
    "business-partnership-manager": "worker",
    "business-strategy": "worker",
    "contents-director": "director",
    "contents-formatter": "worker",
    "contents-quality-manager": "worker",
    "contents-researcher": "worker",
    "gate-prompt-formatter": "gate",
    "gate-task-creator": "gate",
    "gate-task-evaluator": "gate",
    "git-publisher": "worker",
    "infra-director": "director",
    "infra-local-qa": "worker",
    "infra-task-dispatcher": "worker",
    "infra-team-bootstrap": "worker",
    "teams-project-manager": "tpm",
    "tech-architect": "worker",
    "tech-backend": "worker",
    "tech-data-structure": "worker",
    "tech-debugger": "worker",
    "tech-designer": "worker",
    "tech-devopssec": "worker",
    "tech-director": "director",
    "tech-docs": "worker",
    "tech-frontend": "worker",
    "tech-infrastructure": "worker",
    "tech-lead": "worker",
    "tech-mobile": "worker",
    "tech-performance": "worker",
    "tech-qa": "worker",
    "tech-reviewer": "worker",
    "tech-security": "worker",
    "tech-tester": "worker"
  },
  "defaults": {
    "tmux_session": "itb-{org_instance_id}",
    "tmux_window": "{role_id}",
    "tmux_pane": 0,
    "queue_consumer": false,
    "inbox_path": "inbox/{role_id}.yaml",
    "report_dir": "reports/{role_id}",
    "queue_finalizer": "role-report",
    "report_write_mode": "builder_atomic",
    "allowed_tools": ["Read", "Grep", "Glob"],
    "context_dirs": [],
    "git_operations_allowed": false
  },
  "agents": {
    "gate-prompt-formatter": {
      "model_registry_ref": "gate-prompt-formatter",
      "queue_consumer": true
    },
    "gate-task-creator": {
      "model_registry_ref": "gate-task-creator",
      "queue_consumer": true,
      "allowed_tools": ["Read", "Grep", "Glob"]
    },
    "teams-project-manager": {
      "model_registry_ref": "teams-project-manager",
      "queue_consumer": true,
      "allowed_tools": ["Read", "Grep", "Glob", "Write", "Edit", "Agent"]
    },
    "gate-task-assessor": {
      "model_registry_ref": "gate-task-assessor",
      "queue_consumer": false,
      "allowed_tools": ["Read", "Grep", "Glob"]
    },
    "gate-task-evaluator": {
      "model_registry_ref": "gate-task-evaluator",
      "queue_consumer": true,
      "allowed_tools": ["Read", "Grep", "Glob"]
    },
    "gate-task-guardian": {
      "model_registry_ref": "gate-task-guardian",
      "queue_consumer": false,
      "allowed_tools": ["Read", "Grep", "Glob"]
    },
    "git-publisher": {
      "model_registry_ref": "git-publisher",
      "queue_consumer": true,
      "allowed_tools": ["Bash", "Read", "Grep"]
    },
    "infra-director": {
      "model_registry_ref": "infra-director",
      "queue_consumer": true,
      "context_dirs": ["${AGENTS_VAULT_ROOT}"],
      "allowed_tools": ["Read", "Grep", "Glob", "Bash", "Write", "Edit", "Agent"]
    },
    "infra-local-qa": {
      "model_registry_ref": "infra-local-qa",
      "context_dirs": ["${AGENTS_VAULT_ROOT}"]
    },
    "infra-task-dispatcher": {
      "model_registry_ref": "infra-task-dispatcher",
      "context_dirs": ["${AGENTS_VAULT_ROOT}"]
    },
    "tech-lead": {
      "model_registry_ref": "tech-lead"
    },
    "tech-backend": {
      "model_registry_ref": "tech-backend"
    },
    "tech-qa": {
      "model_registry_ref": "tech-qa"
    },
    "tech-tester": {
      "model_registry_ref": "tech-tester"
    }
  }
}
