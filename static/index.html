<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sahai</title>
<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --card: #1c2128;
    --border: #30363d;
    --fg: #c9d1d9;
    --dim: #8b949e;
    --faint: #545d68;
    --yellow: #f2cc60;
    --green: #56d364;
    --red: #f85149;
    --blue: #58a6ff;
    --mono: "SF Mono", "Menlo", "Consolas", monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, "Hiragino Sans", "Segoe UI", sans-serif;
    font-size: 14px;
  }
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 20px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; }
  header h1 .dot { color: var(--yellow); }
  #session-select {
    background: var(--card);
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 13px;
    max-width: 520px;
  }
  #org-meta {
    color: var(--dim);
    font-size: 12px;
    margin-left: auto;
    text-align: right;
  }
  #org-meta .live { color: var(--green); }
  #org-meta .offline { color: var(--red); }
  #org-meta .busy { color: var(--yellow); font-weight: 700; }
  main { display: flex; }
  #workspace { flex: 1; min-width: 0; padding: 16px 20px; }
  #control-panel {
    border: 1px solid var(--border);
    background: var(--panel);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 16px;
    display: grid;
    gap: 10px;
  }
  .control-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .control-title { font-weight: 700; font-size: 13px; }
  .pill {
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 2px 8px;
    font-size: 11px;
    color: var(--dim);
    background: rgba(139,148,158,.08);
  }
  .pill.good { color: var(--green); border-color: rgba(86,211,100,.45); }
  .pill.warn { color: var(--yellow); border-color: rgba(242,204,96,.45); }
  .pill.bad { color: var(--red); border-color: rgba(248,81,73,.45); }
  #decision-form { display: flex; gap: 8px; flex: 1; min-width: 260px; }
  #decision-input {
    flex: 1;
    min-width: 220px;
    background: var(--card);
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 8px;
  }
  #decision-form button,
  #detail-head button,
  #workflow-runs button,
  #workflow-runs select {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--fg);
    border-radius: 6px;
    padding: 6px 10px;
    cursor: pointer;
  }
  #decision-result { color: var(--dim); font-size: 12px; }
  .team { margin-bottom: 20px; }
  .team-title {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--dim);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .team-title .count { color: var(--faint); }
  .team-title .busy-badge {
    color: #1c2128;
    background: var(--yellow);
    border-radius: 8px;
    padding: 0 7px;
    font-size: 11px;
    font-weight: 700;
  }
  .grid {
    display: grid;
    gap: 10px;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  }
  .card {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    cursor: pointer;
    transition: border-color .15s, box-shadow .15s;
  }
  .card:hover { border-color: var(--faint); }
  .card.selected { outline: 1px solid var(--dim); }
  .card .role { font-weight: 600; font-size: 13px; word-break: break-word; }
  .card .meta { color: var(--dim); font-size: 11px; margin-top: 4px; line-height: 1.5; }
  .card .state-line { margin-top: 6px; display: flex; gap: 6px; align-items: center; font-size: 11px; }
  .card.working { border-color: var(--yellow); box-shadow: 0 0 10px rgba(242,204,96,.35); }
  .card.processing { border-color: var(--yellow); border-style: dashed; }
  .card.pending { border-color: var(--blue); }
  .card.deferred { opacity: .55; }
  .card.offline { border-color: rgba(248,81,73,.45); opacity: .65; }
  .badge {
    display: inline-block;
    border-radius: 8px;
    padding: 0 7px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .5px;
  }
  .badge.working { background: var(--yellow); color: #1c2128; }
  .badge.processing { background: rgba(242,204,96,.2); color: var(--yellow); }
  .badge.pending { background: rgba(88,166,255,.18); color: var(--blue); }
  .badge.ready { background: rgba(139,148,158,.15); color: var(--dim); }
  .badge.deferred { background: rgba(84,93,104,.2); color: var(--faint); }
  .badge.offline { background: rgba(248,81,73,.15); color: var(--red); }
  .pending-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--blue);
    display: inline-block;
  }
  #detail {
    width: 0;
    overflow: hidden;
    transition: width .2s ease;
    background: var(--panel);
    border-left: 1px solid var(--border);
    height: calc(100vh - 49px);
    position: sticky;
    top: 49px;
    display: flex;
    flex-direction: column;
  }
  #detail.open { width: 46vw; min-width: 420px; }
  #detail-head {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  #detail-head .role { font-weight: 700; }
  #detail-head .path {
    color: var(--faint);
    font-size: 11px;
    font-family: var(--mono);
    word-break: break-all;
  }
  #detail-head .close { margin-left: auto; }
  #agent-info,
  #inbox-info {
    padding: 8px 14px;
    color: var(--dim);
    font-size: 12px;
    border-bottom: 1px solid var(--border);
    line-height: 1.6;
  }
  #detail-body {
    flex: 1;
    overflow: auto;
    margin: 0;
    padding: 12px 14px;
    font-family: var(--mono);
    font-size: 11.5px;
    line-height: 1.45;
    white-space: pre-wrap;
    word-break: break-word;
    color: #b6c2cf;
    background: #0a0d12;
  }
  #detail-body .err { color: var(--red); }
  footer {
    padding: 8px 20px;
    color: var(--faint);
    font-size: 11px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
  }
  .legend { display: inline-flex; align-items: center; gap: 5px; }
  .swatch {
    width: 12px;
    height: 12px;
    border-radius: 3px;
    border: 2px solid var(--border);
    display: inline-block;
  }
  .swatch.working { border-color: var(--yellow); box-shadow: 0 0 5px rgba(242,204,96,.35); }
  .swatch.processing { border-color: var(--yellow); border-style: dashed; }
  .swatch.pending { border-color: var(--blue); }
  .swatch.deferred { opacity: .45; }
  .swatch.offline { border-color: rgba(248,81,73,.45); }
  #empty { color: var(--dim); padding: 40px; text-align: center; }
  #workflow-runs {
    border-top: 1px solid var(--border);
    margin-top: 18px;
    padding-top: 16px;
  }
  #workflow-runs h2 {
    font-size: 13px;
    margin: 0;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--dim);
  }
  .wf-head,
  .wf-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .wf-head { justify-content: space-between; margin-bottom: 10px; }
  .wf-controls label {
    color: var(--dim);
    font-size: 12px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  #wf-lock-banner,
  #wf-error {
    border: 1px solid var(--border);
    background: rgba(139,148,158,.08);
    border-radius: 6px;
    margin-bottom: 10px;
    padding: 8px 10px;
    color: var(--dim);
    font-size: 12px;
  }
  #wf-lock-banner.stale,
  #wf-error {
    border-color: rgba(248,81,73,.55);
    color: var(--red);
    background: rgba(248,81,73,.08);
  }
  #wf-lock-banner.locked {
    border-color: rgba(242,204,96,.45);
    color: var(--yellow);
    background: rgba(242,204,96,.08);
  }
  .wf-table-wrap {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 8px;
  }
  #wf-run-table {
    width: 100%;
    border-collapse: collapse;
    min-width: 760px;
    background: var(--panel);
  }
  #wf-run-table th,
  #wf-run-table td {
    border-bottom: 1px solid var(--border);
    padding: 8px 10px;
    text-align: left;
    vertical-align: top;
  }
  #wf-run-table th {
    color: var(--dim);
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .8px;
    background: #11161d;
  }
  #wf-run-table tbody tr {
    cursor: pointer;
    transition: background .15s;
  }
  #wf-run-table tbody tr:hover,
  #wf-run-table tbody tr.selected {
    background: rgba(88,166,255,.08);
  }
  #wf-run-table .mono,
  #wf-run-detail .mono {
    font-family: var(--mono);
    font-size: 11px;
    word-break: break-all;
  }
  .wf-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1px 7px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .wf-badge-created { color: var(--dim); background: transparent; }
  .wf-badge-queued { color: var(--fg); background: rgba(139,148,158,.18); }
  .wf-badge-provider { color: #1c2128; background: var(--yellow); border-color: var(--yellow); animation: wf-pulse 1.5s ease-in-out infinite; }
  .wf-badge-validating { color: var(--yellow); border-color: var(--yellow); border-style: dashed; background: rgba(242,204,96,.08); }
  .wf-badge-human { color: var(--yellow); border-color: rgba(242,204,96,.55); background: rgba(248,151,31,.10); }
  .wf-badge-human::before {
    content: "";
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #f0883e;
  }
  .wf-badge-complete { color: #1c2128; background: var(--green); border-color: var(--green); }
  .wf-badge-failed { color: var(--red); border-color: rgba(248,81,73,.7); background: rgba(248,81,73,.12); }
  .wf-badge-aborted { color: #ffa198; border-color: rgba(248,81,73,.35); background: rgba(248,81,73,.05); }
  .wf-badge-unknown { color: var(--faint); background: rgba(84,93,104,.16); }
  .wf-stuck {
    box-shadow: 0 0 0 1px var(--red);
  }
  @keyframes wf-pulse {
    0%, 100% { box-shadow: 0 0 0 rgba(242,204,96,0); }
    50% { box-shadow: 0 0 10px rgba(242,204,96,.45); }
  }
  #wf-run-detail {
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--panel);
    margin-top: 12px;
    padding: 12px;
  }
  #wf-run-detail h3 {
    font-size: 13px;
    margin: 0 0 10px;
  }
  #wf-run-detail h4 {
    color: var(--dim);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .8px;
    margin: 14px 0 8px;
  }
  #wf-run-detail dl {
    display: grid;
    grid-template-columns: minmax(120px, 180px) 1fr;
    gap: 6px 10px;
    margin: 0;
  }
  #wf-run-detail dt { color: var(--dim); }
  #wf-run-detail dd { margin: 0; min-width: 0; word-break: break-word; }
  .wf-mini-table {
    width: 100%;
    border-collapse: collapse;
  }
  .wf-mini-table th,
  .wf-mini-table td {
    border: 1px solid var(--border);
    padding: 6px 8px;
    text-align: left;
    vertical-align: top;
  }
  .wf-mini-table th {
    color: var(--dim);
    background: #11161d;
  }
  .wf-empty {
    color: var(--dim);
    padding: 14px;
    text-align: center;
  }
</style>
</head>
<body>
<header>
  <h1>Sahai <span class="dot">●</span></h1>
  <select id="session-select" title="監視対象のチャットセッション"></select>
  <div id="org-meta"></div>
</header>
<main>
  <div id="workspace">
    <section id="control-panel"></section>
    <div id="board"><div id="empty">セッションを読み込み中...</div></div>
    <section id="workflow-runs" data-panel="workflow-runs">
      <div class="wf-head">
        <h2>Workflow Runs</h2>
        <div class="wf-controls">
          <select id="wf-state-filter" title="workflow run state filter">
            <option value="">All</option>
            <option value="created">created</option>
            <option value="step_queued">step_queued</option>
            <option value="waiting_provider">waiting_provider</option>
            <option value="validating">validating</option>
            <option value="remediating">remediating</option>
            <option value="waiting_human">waiting_human</option>
            <option value="complete">complete</option>
            <option value="failed">failed</option>
            <option value="aborted">aborted</option>
          </select>
          <label><input type="checkbox" id="wf-session-only" checked> current session only</label>
          <button id="wf-refresh" type="button">refresh</button>
        </div>
      </div>
      <div id="wf-lock-banner" data-role="lock-banner" hidden></div>
      <div id="wf-error" data-role="wf-error" hidden></div>
      <div class="wf-table-wrap">
        <table id="wf-run-table">
          <thead>
            <tr>
              <th>Run</th>
              <th>Task</th>
              <th>Workflow</th>
              <th>State</th>
              <th>Reason</th>
              <th>Age</th>
              <th>Runtime</th>
            </tr>
          </thead>
          <tbody id="wf-run-table-body">
            <tr><td colspan="7" class="wf-empty">loading...</td></tr>
          </tbody>
        </table>
      </div>
      <div id="wf-run-detail" data-role="run-detail" hidden></div>
    </section>
  </div>
  <aside id="detail">
    <div id="detail-head">
      <span class="role" id="d-role"></span>
      <span class="path" id="d-path"></span>
      <button id="d-refresh">refresh</button>
      <button class="close" id="d-close">close</button>
    </div>
    <div id="agent-info"></div>
    <div id="inbox-info"></div>
    <pre id="detail-body"></pre>
  </aside>
</main>
<footer>
  <span class="legend"><span class="swatch working"></span> working</span>
  <span class="legend"><span class="swatch processing"></span> processing</span>
  <span class="legend"><span class="swatch pending"></span> pending</span>
  <span class="legend"><span class="swatch"></span> ready</span>
  <span class="legend"><span class="swatch deferred"></span> deferred</span>
  <span class="legend"><span class="swatch offline"></span> offline</span>
  <span id="poll-info" style="margin-left:auto"></span>
</footer>

<script>
const POLL_MS = 2000;
const DETAIL_POLL_MS = 2500;
const WORKFLOW_POLL_MS = 15000;
const WF_STUCK_SECONDS = 1800;
let currentSession = null;
let selectedRole = null;
let selectedWorkflowRun = null;
let orgTimer = null;
let detailTimer = null;
let workflowTimer = null;
let orgConfig = null;

const $ = (id) => document.getElementById(id);

async function fetchJSON(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`${res.status}`);
  return res.json();
}

function esc(s) {
  return String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function relTime(sec) {
  if (sec == null) return "-";
  if (sec < 60) return `${sec}s前`;
  if (sec < 3600) return `${Math.floor(sec / 60)}m前`;
  if (sec < 86400) return `${Math.floor(sec / 3600)}h前`;
  return `${Math.floor(sec / 86400)}d前`;
}

function truncateText(value, limit = 400) {
  const text = String(value ?? "");
  return text.length > limit ? `${text.slice(0, limit)}...` : text;
}

function fieldValue(value) {
  if (value == null || value === "") return "-";
  if (typeof value === "object") return truncateText(JSON.stringify(value));
  return truncateText(value);
}

function definitionList(rows) {
  return `<dl>${rows.map(([key, value, cls = ""]) =>
    `<dt>${esc(key)}</dt><dd class="${cls}">${esc(fieldValue(value))}</dd>`
  ).join("")}</dl>`;
}

async function loadConfig() {
  try {
    orgConfig = await fetchJSON("/api/config");
    renderConfig();
  } catch (e) {
    $("control-panel").innerHTML = '<div class="control-row"><span class="pill bad">CONFIG ERROR</span></div>';
  }
}

function renderConfig(decision = null) {
  const settings = (orgConfig || {}).settings || {};
  const control = settings.control || {};
  const hook = settings.hook_policy || {};
  const state = control.state || "-";
  const mode = control.default_mode || "-";
  const hardBlock = hook.hard_block ? "hard block" : "observer";
  const hardClass = hook.hard_block ? "bad" : "good";
  const stateClass = state === "enabled" ? "good" : (state === "maintenance" ? "warn" : "bad");
  const decisionText = decision
    ? `判定: ${esc(decision.mode)} / ${esc(decision.organization_state)} / ${esc(decision.reason)}`
    : "";
  $("control-panel").innerHTML =
    `<div class="control-row">` +
      `<span class="control-title">Organization Control</span>` +
      `<span class="pill ${stateClass}">${esc(state)}</span>` +
      `<span class="pill warn">default ${esc(mode)}</span>` +
      `<span class="pill ${hardClass}">hook ${esc(hardBlock)}</span>` +
      `<span class="pill">${esc((orgConfig || {}).role_count || 0)} roles</span>` +
      `<span class="pill">${esc((orgConfig || {}).policy_count || 0)} policies</span>` +
    `</div>` +
    `<div class="control-row">` +
      `<form id="decision-form">` +
        `<input id="decision-input" value="" placeholder="最近の天気予報を調べる">` +
        `<button type="submit">decide</button>` +
      `</form>` +
      `<span id="decision-result">${decisionText}</span>` +
    `</div>`;
  $("decision-form").addEventListener("submit", decidePrompt);
}

async function decidePrompt(e) {
  e.preventDefault();
  const prompt = $("decision-input").value || "";
  const decision = await fetchJSON(`/api/decide?prompt=${encodeURIComponent(prompt)}`);
  renderConfig(decision);
  $("decision-input").value = prompt;
}

async function loadSessions() {
  const data = await fetchJSON("/api/sessions");
  const sel = $("session-select");
  const prev = currentSession;
  sel.innerHTML = "";
  for (const s of data.sessions) {
    const opt = document.createElement("option");
    opt.value = s.session_id;
    const mark = s.live ? "live" : "offline";
    const task = s.active_task_id ? ` [${s.active_task_id}]` : "";
    opt.textContent = `${mark} ${s.chat_name || s.session_id.slice(0, 8)}${task}`;
    sel.appendChild(opt);
  }
  if (data.sessions.length === 0) {
    currentSession = null;
    $("board").innerHTML = '<div id="empty">ITB セッションが見つかりません</div>';
    startWorkflowPolling();
    return;
  }
  if (prev && data.sessions.some(s => s.session_id === prev)) {
    sel.value = prev;
  } else {
    currentSession = data.sessions[0].session_id;
    sel.value = currentSession;
  }
  startOrgPolling();
  startWorkflowPolling();
}

$("session-select").addEventListener("change", (e) => {
  currentSession = e.target.value;
  closeDetail();
  clearRunDetail();
  startOrgPolling();
  startWorkflowPolling();
});

function startOrgPolling() {
  if (orgTimer) clearInterval(orgTimer);
  loadOrg();
  orgTimer = setInterval(loadOrg, POLL_MS);
  $("poll-info").textContent = `更新間隔 ${POLL_MS / 1000}s`;
}

async function loadOrg() {
  if (!currentSession) return;
  let data;
  try {
    data = await fetchJSON(`/api/org?session=${encodeURIComponent(currentSession)}`);
  } catch (e) {
    return;
  }
  if (data.error) {
    $("board").innerHTML = `<div id="empty">${esc(data.error)}</div>`;
    return;
  }
  renderMeta(data);
  renderBoard(data);
}

function renderMeta(d) {
  const live = d.live ? '<span class="live">● live</span>' : '<span class="offline">● offline</span>';
  const task = d.active_task.task_id
    ? ` / ${esc(d.active_task.task_id)} (${esc(d.active_task.flow_phase)})`
    : "";
  const context = d.execution_context_path ? `<br><code>${esc(d.execution_context_path)}</code>` : "";
  $("org-meta").innerHTML =
    `${live}${task}${context}<br>` +
    `active <span class="busy">${d.busy_count}</span> / roles ${d.agent_count}`;
}

function renderBoard(d) {
  const board = $("board");
  const frag = document.createDocumentFragment();
  for (const team of (d.teams || [])) {
    const sec = document.createElement("section");
    sec.className = "team";
    const busy = team.agents.filter(a => a.busy).length;
    sec.innerHTML = `<div class="team-title">${esc(team.label)}` +
      ` <span class="count">${team.agents.length}</span>` +
      (busy ? ` <span class="busy-badge">${busy} active</span>` : "") + `</div>`;
    const grid = document.createElement("div");
    grid.className = "grid";
    for (const a of team.agents) {
      grid.appendChild(card(a));
    }
    sec.appendChild(grid);
    frag.appendChild(sec);
  }
  board.innerHTML = "";
  board.appendChild(frag);
}

function card(a) {
  const el = document.createElement("div");
  el.className = `card ${a.status}` + (a.role_id === selectedRole ? " selected" : "");
  const pending = a.inbox_pending ? ` <span class="pending-dot" title="pending ${a.inbox_pending}"></span>` : "";
  const task = a.active_for_task ? `${esc(a.active_for_task)} · ` : "";
  const report = a.latest_report_status ? ` · report ${esc(a.latest_report_status)}` : "";
  el.innerHTML =
    `<div class="role">${esc(a.role_id)}${pending}</div>` +
    `<div class="meta">${task}${esc(a.role_layer || a.team)}${report}</div>` +
    `<div class="state-line"><span class="badge ${a.status}">${a.status.toUpperCase()}</span>` +
    `<span style="color:var(--faint)">${relTime(a.report_age_sec)}</span></div>`;
  el.addEventListener("click", () => openDetail(a.role_id));
  return el;
}

function workflowBadgeClass(state) {
  return ({
    created: "wf-badge-created",
    step_queued: "wf-badge-queued",
    waiting_provider: "wf-badge-provider",
    validating: "wf-badge-validating",
    waiting_human: "wf-badge-human",
    complete: "wf-badge-complete",
    failed: "wf-badge-failed",
    aborted: "wf-badge-aborted",
  })[state] || "wf-badge-unknown";
}

function workflowBadge(run) {
  const state = String(run.run_state || "unknown");
  const stuck = state === "waiting_provider" && Number(run.stale_seconds || 0) > WF_STUCK_SECONDS;
  const title = stuck ? ' title="provider silent > 30 min - see recovery runbook"' : "";
  const cls = `wf-badge ${workflowBadgeClass(state)}${stuck ? " wf-stuck" : ""}`;
  return `<span class="${cls}"${title}>${esc(state)}</span>`;
}

function workflowQuery() {
  const params = new URLSearchParams();
  const state = $("wf-state-filter").value || "";
  if (state) params.set("state", state);
  if ($("wf-session-only").checked && currentSession) params.set("session", currentSession);
  const query = params.toString();
  return query ? `?${query}` : "";
}

function startWorkflowPolling() {
  if (workflowTimer) clearInterval(workflowTimer);
  loadWorkflowRuns();
  workflowTimer = setInterval(loadWorkflowRuns, WORKFLOW_POLL_MS);
}

function clearRunDetail() {
  selectedWorkflowRun = null;
  const detail = $("wf-run-detail");
  detail.hidden = true;
  detail.innerHTML = "";
  for (const row of $("wf-run-table-body").querySelectorAll("tr[data-run-id]")) {
    row.classList.remove("selected");
  }
}

function workflowFilterChanged() {
  clearRunDetail();
  loadWorkflowRuns();
}

function workflowError(message) {
  const el = $("wf-error");
  if (!message) {
    el.hidden = true;
    el.textContent = "";
    return;
  }
  el.hidden = false;
  el.textContent = message;
}

async function loadWorkflowRuns() {
  try {
    const [runsData, lockData] = await Promise.all([
      fetchJSON(`/api/workflow-runs${workflowQuery()}`),
      fetchJSON("/api/workflow-lock"),
    ]);
    workflowError("");
    renderWorkflowLock(lockData.locks || []);
    renderWorkflowRuns(runsData.workflow_runs || []);
  } catch (e) {
    workflowError(`workflow runs unavailable: ${e.message || e}`);
  }
}

function renderWorkflowLock(locks) {
  const banner = $("wf-lock-banner");
  const stale = locks.find(lock => lock.locked && lock.stale);
  const locked = locks.find(lock => lock.locked);
  if (stale) {
    banner.hidden = false;
    banner.className = "stale";
    banner.textContent = `stale global lock detected (${stale.runtime || "runtime"})`;
    return;
  }
  if (locked) {
    banner.hidden = false;
    banner.className = "locked";
    banner.textContent = `run in progress (${locked.runtime || "runtime"})`;
    return;
  }
  banner.hidden = true;
  banner.className = "";
  banner.textContent = "";
}

function renderWorkflowRuns(runs) {
  const tbody = $("wf-run-table-body");
  if (!runs.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="wf-empty">no workflow runs yet</td></tr>';
    return;
  }
  tbody.innerHTML = "";
  for (const run of runs) {
    const tr = document.createElement("tr");
    tr.dataset.runId = run.run_id || "";
    tr.dataset.runtime = run.runtime || "";
    tr.dataset.orchRoot = run.orch_root || "";
    if (selectedWorkflowRun && selectedWorkflowRun.run_id === run.run_id) {
      tr.classList.add("selected");
    }
    const reason = (run.terminal && (run.terminal.reason || run.terminal.status)) || run.derived_status || "-";
    tr.innerHTML =
      `<td class="mono">${esc(run.run_id || "-")}</td>` +
      `<td class="mono">${esc(run.task_id || "-")}</td>` +
      `<td>${esc(run.workflow_id || "-")}</td>` +
      `<td>${workflowBadge(run)}</td>` +
      `<td>${esc(reason)}</td>` +
      `<td>${esc(relTime(run.stale_seconds))}</td>` +
      `<td>${esc(run.runtime || "-")}</td>`;
    tr.addEventListener("click", () => loadRunDetail(run));
    tbody.appendChild(tr);
  }
}

function detailSection(name, title, body) {
  if (!body) return "";
  return `<section data-detail-section="${esc(name)}"><h4>${esc(title)}</h4>${body}</section>`;
}

function renderFindings(report) {
  const findings = Array.isArray(report.findings) ? report.findings : [];
  if (!findings.length) return "";
  const rows = findings.map(finding =>
    `<tr><td>${esc(fieldValue(finding.severity))}</td>` +
    `<td>${esc(fieldValue(finding.status))}</td>` +
    `<td>${esc(fieldValue(finding.summary))}</td></tr>`
  ).join("");
  return `<table class="wf-mini-table"><thead><tr><th>Severity</th><th>Status</th><th>Summary</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function renderTransitions(transitions) {
  if (!Array.isArray(transitions) || !transitions.length) return "";
  const rows = transitions.map((item, index) =>
    `<tr><td>${esc(item.seq ?? index + 1)}</td>` +
    `<td>${esc(fieldValue(item.previous_state || item.from_state || item.from))}</td>` +
    `<td>${esc(fieldValue(item.next_state || item.to_state || item.to))}</td>` +
    `<td>${esc(fieldValue(item.reason || item.reason_class || item.outcome))}</td>` +
    `<td class="mono">${esc(fieldValue(item.occurred_at || item.created_at || item.checked_at))}</td></tr>`
  ).join("");
  return `<table class="wf-mini-table"><thead><tr><th>Seq</th><th>From</th><th>To</th><th>Reason</th><th>At</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function renderRejections(rejections) {
  if (!Array.isArray(rejections) || !rejections.length) return "";
  const rows = rejections.map(item =>
    `<tr><td>${esc(fieldValue(item.outcome || item.decision || item.result))}</td>` +
    `<td>${esc(fieldValue(item.errors || item.reason || item.reasons))}</td></tr>`
  ).join("");
  return `<table class="wf-mini-table"><thead><tr><th>Outcome</th><th>Errors</th></tr></thead><tbody>${rows}</tbody></table>`;
}

async function loadRunDetail(run) {
  selectedWorkflowRun = run;
  const detail = $("wf-run-detail");
  detail.hidden = false;
  detail.innerHTML = `<h3>${esc(run.run_id || "workflow run")}</h3><div class="wf-empty">loading...</div>`;
  for (const row of $("wf-run-table-body").querySelectorAll("tr[data-run-id]")) {
    row.classList.toggle("selected", row.dataset.runId === run.run_id);
  }
  const params = new URLSearchParams({ run: run.run_id || "" });
  if ($("wf-session-only").checked && currentSession) params.set("session", currentSession);
  if (run.runtime) params.set("runtime", run.runtime);
  if (run.orch_root) params.set("orch_root", run.orch_root);
  try {
    const payload = await fetchJSON(`/api/workflow-run?${params.toString()}`);
    renderRunDetail(payload.workflow_run || {});
    await loadWorkflowRuns();
  } catch (e) {
    detail.innerHTML = `<h3>${esc(run.run_id || "workflow run")}</h3><div class="wf-empty err">${esc(e.message || e)}</div>`;
  }
}

function renderRunDetail(payload) {
  const run = payload.run || {};
  const record = payload.run_record || {};
  const terminal = run.terminal || {};
  const workOrder = payload.work_order || null;
  const report = payload.report || null;
  const evidence = payload.evidence || null;
  const detail = $("wf-run-detail");
  const summary = definitionList([
    ["Run", run.run_id, "mono"],
    ["Task", run.task_id, "mono"],
    ["Request", run.request_id, "mono"],
    ["Workflow", run.workflow_id],
    ["State", run.run_state],
    ["Activation", run.activation_status || record.activation?.activation_status],
    ["Current step", run.current_step],
    ["Runtime", payload.runtime],
    ["State root", payload.orch_root, "mono"],
  ]);
  const terminalBody = definitionList([
    ["Status", terminal.status],
    ["Reason", terminal.reason],
    ["Goal state", run.goal_state],
    ["Last transition", run.last_transition_at, "mono"],
  ]);
  const workOrderBody = workOrder ? definitionList([
    ["To role", workOrder.to_role],
    ["Assignment role", workOrder.assignment_role],
    ["Permission mode", workOrder.permission_mode],
    ["Expected output", workOrder.expected_output],
    ["Instruction", workOrder.instruction],
    ["Refs", Array.isArray(workOrder.refs) ? workOrder.refs.length : workOrder.refs],
  ]) : "";
  const reportBody = report ? (
    definitionList([
      ["Result", report.result],
      ["Summary", report.summary],
      ["Finding count", Array.isArray(report.findings) ? report.findings.length : 0],
    ]) + renderFindings(report)
  ) : "";
  const provider = evidence || (report && report.provider_evidence) || null;
  const evidenceBody = provider ? definitionList([
    ["Provider", provider.provider],
    ["Effective model", provider.effective_model],
    ["Session id", provider.provider_session_id],
    ["Request id", provider.request_id || provider.provider_request_id],
    ["Duration", provider.duration_seconds],
    ["Usage", provider.usage],
    ["Evidence path", provider.evidence_path || run.evidence_path, "mono"],
    ["Transcript path", provider.transcript_path, "mono"],
    ["Outcome", provider.outcome],
  ]) : "";
  detail.innerHTML =
    `<h3>${esc(run.run_id || "workflow run")}</h3>` +
    detailSection("summary", "Summary", summary) +
    detailSection("terminal", "Terminal", terminalBody) +
    detailSection("work-order", "Work Order", workOrderBody) +
    detailSection("report", "Report", reportBody) +
    detailSection("evidence", "Evidence", evidenceBody) +
    detailSection("transitions", "Transitions", renderTransitions(payload.transitions)) +
    detailSection("rejections", "Rejections", renderRejections(payload.rejections));
}

function openDetail(role) {
  selectedRole = role;
  $("detail").classList.add("open");
  $("d-role").textContent = role;
  $("detail-body").textContent = "loading...";
  loadRoleDetail();
  if (detailTimer) clearInterval(detailTimer);
  detailTimer = setInterval(loadRoleDetail, DETAIL_POLL_MS);
}

function closeDetail() {
  selectedRole = null;
  $("detail").classList.remove("open");
  if (detailTimer) {
    clearInterval(detailTimer);
    detailTimer = null;
  }
}

async function loadRoleDetail() {
  if (!selectedRole || !currentSession) return;
  let data;
  try {
    data = await fetchJSON(`/api/role?session=${encodeURIComponent(currentSession)}&role=${encodeURIComponent(selectedRole)}`);
  } catch (e) {
    return;
  }
  if (data.error) {
    $("detail-body").innerHTML = `<span class="err">${esc(data.error)}</span>`;
    return;
  }
  const ag = data.agent || {};
  $("d-path").textContent = data.latest_report_path || "";
  $("agent-info").innerHTML =
    `team: <b>${esc(ag.team)}</b> · layer: ${esc(ag.role_layer || "-")}` +
    ` · model ref: ${esc(ag.model_registry_ref || "-")}` +
    ` · queue consumer: ${ag.queue_consumer ? "true" : "false"}`;
  const inbox = data.inbox || [];
  $("inbox-info").innerHTML = inbox.length
    ? "inbox: " + inbox.map(m =>
        `<span title="${esc(m.message_id)}">[${esc(m.status)}] ${esc(m.task_id || m.from_role)}</span>`
      ).join(" · ")
    : "inbox: empty";
  $("detail-body").textContent = data.detail || "";
}

$("d-close").addEventListener("click", closeDetail);
$("d-refresh").addEventListener("click", loadRoleDetail);
$("wf-refresh").addEventListener("click", loadWorkflowRuns);
$("wf-state-filter").addEventListener("change", workflowFilterChanged);
$("wf-session-only").addEventListener("change", workflowFilterChanged);

loadConfig();
loadSessions();
setInterval(loadSessions, 30000);
setInterval(loadConfig, 30000);
</script>
</body>
</html>
